# Simple set of rules for GitHub actions integration with a ROS project
#

name: Build

on:
  push:
    branches: [main, jazzy]
  pull_request:
  workflow_dispatch:

env:
  CORTEX_PATH: ${{ github.workspace }}/cortex
  PIP_BREAK_SYSTEM_PACKAGES: "1"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
      - name: Setup ROS 2
        uses: ros-tooling/setup-ros@0.7.19
      - name: Install Cortex
        run: |
          mkdir $CORTEX_PATH && cd $CORTEX_PATH
          curl -o installation.sh https://raw.githubusercontent.com/grupo-avispa/cortex/development/installation.sh
          chmod +x installation.sh
          ./installation.sh
      - name: Cache APT packages
        uses: actions/cache@v4.2.0
        with:
          path: ${{ github.workspace }}/.apt-cache/archives
          key: ${{ runner.os }}-jazzy-apt-${{ hashFiles('**/package.xml') }}
          restore-keys: |
            ${{ runner.os }}-jazzy-apt-
      - name: Install ROS dependencies (rosdep)
        run: |
          sudo mkdir -p "$GITHUB_WORKSPACE/.apt-cache/archives/partial"
          echo 'Dir::Cache::Archives "'"$GITHUB_WORKSPACE"'/.apt-cache/archives";' | sudo tee /etc/apt/apt.conf.d/99-workspace-archives >/dev/null
          sudo apt-get update
          rosdep update --rosdistro jazzy
          for attempt in 1 2 3; do
            if rosdep install --from-paths . --ignore-src -r -y --rosdistro jazzy; then
              break
            fi
            echo "rosdep install failed (attempt $attempt/3), retrying in 5s..."
            sleep 5
          done
      - name: Verify ROS Python tooling
        run: |
          if ! python3 -c "import ament_package" 2>/dev/null; then
            echo "::warning::ament_package not importable, reinstalling ros-jazzy-ament-package"
            sudo apt-get install --reinstall -y ros-jazzy-ament-package
          fi
          python3 -c "import ament_package; print('ament_package OK:', ament_package.__file__)"
      - name: Install dependencies
        uses: ros-tooling/action-ros-ci@0.4.8
        with:
          package-name: |
            dsr_ros
            dsr_agents
            dsr_bridge
            dsr_msgs
            dsr_rqt_plugin
            dsr_util
          target-ros2-distro: jazzy
          skip-rosdep-install: true
          colcon-defaults: |
            {
              "build": {
                "mixin": ["coverage-gcc", "coverage-pytest"]
              },
              "test": {
                "mixin": ["coverage-pytest"]
              }
            }
          skip-tests: false
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ros_ws/lcov/total_coverage.info,ros_ws/coveragepy/.coverage
          flags: unittests
          name: codecov-umbrella
          slug: grupo-avispa/dsr_ros
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          report_type: test_results
